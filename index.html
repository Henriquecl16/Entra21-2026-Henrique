<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de css</title>
    <style>
button{
    background-color: rgb(0, 0, 0);
    color: rgb(248, 248, 248);
    font-size: 18px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}


.input{
    padding: 10px;
    border: 0px;
    border-bottom: solid 1px rgb(0, 0, 0);
     margin: 10px;
}
#cadastro{
    width: 210px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0, 0, 0,0.2)
    

}
.Site{
    background-color: rgb(0, 0, 0);
   color: rgb(255, 255, 255);
    font-size: 18px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
   

}
body{
    background-color: rgb(46, 45, 45);
}

img{
    margin: auto;
}


    
    </style>
</head>
<body>
    <p style="color: rgb(255, 255, 255);font-size: 24px;">Me diga o seu piloto favorito de Formula Um.</p>
    <div id="cadastro">

        <br>
        <input type="text" class="input" placeholder="Ex: Michael Schumacher">
     </div> 
     <br>
    
    <button>Salvar</button>
         <button style="background-color: rgb(0, 0, 0);">Cancelar</button>
